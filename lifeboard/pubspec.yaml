name: lifeboard
description: LifeBoard - Your Personal Life OS | National Hackathon Project
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^8.0.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  glassmorphism: ^3.0.0

  # Navigation
  go_router: ^13.2.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Device
  local_auth: ^2.1.8
  vibration: ^1.8.4
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
